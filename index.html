<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三年級母親節感恩電子卡片成果展</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #fff5f7; /* 淡淡的粉紅色背景 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #d63384;
            margin-bottom: 10px;
        }
        p {
            color: #6c757d;
            margin-bottom: 30px;
        }
        .grid-container {
            display: grid;
            /* 在平板上顯示 4 欄，手機或小螢幕會自動調整 */
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }
        .btn {
            background-color: #ffffff;
            border: 2px solid #ffc107;
            border-radius: 15px;
            color: #444;
            padding: 20px 10px;
            text-align: center;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        /* 點擊時的效果 */
        .btn:active {
            background-color: #ffc107;
            color: white;
            transform: scale(0.95);
        }
        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>🌸 母親節感恩電子卡片成果展 🌸</h1>
    <p>請點擊您的座號，欣賞精彩的作品！</p>

    <div class="grid-container" id="button-grid">
        </div>

    <div class="footer">
        © 三年級電腦課作品集 - 建議使用全螢幕觀賞
    </div>

    <script>
        const grid = document.getElementById('button-grid');
        
        for (let i = 1; i <= 30; i++) {
            // 跳過 22 號
            if (i === 22) continue;

            // 建立按鈕
            const link = document.createElement('a');
            link.href = `p${i.toString().padStart(2, '0')}.html`; // 這裡對應 p01.html, p02.html...
            link.className = 'btn';
            link.innerText = `座號 ${i}`;
            
            grid.appendChild(link);
        }
    </script>

</body>
</html>
